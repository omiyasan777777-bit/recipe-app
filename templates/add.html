{% extends "base.html" %}
{% block content %}

<div style="margin-bottom:20px;">
  <a href="{{ url_for('index') }}" style="font-size:15px; color:#0085ff; text-decoration:none;">← 戻る</a>
</div>

<div class="card">
  <h2 style="font-size:18px; font-weight:700; margin-bottom:20px;">📝 新しい予約投稿</h2>

  <form method="post" enctype="multipart/form-data">

    <div class="form-group">
      <label for="text">投稿テキスト</label>
      <textarea id="text" name="text" maxlength="300"
                placeholder="ここに投稿したい文章を入力してください…"
                oninput="updateCount(this)">{{ form.get('text', '') }}</textarea>
      <div class="char-count">
        <span id="char-count" class="char-ok">0</span> / 300 文字
      </div>
    </div>

    <div class="form-group">
      <label for="scheduled_at">投稿日時</label>
      <input type="datetime-local" id="scheduled_at" name="scheduled_at"
             value="{{ form.get('scheduled_at', '') }}"
             min="{{ now_str }}">
      <p class="hint">📅 この日時になったら自動で投稿されます</p>
    </div>

    <div class="form-group">
      <label for="images">画像（任意・最大4枚）</label>
      <input type="file" id="images" name="images" multiple accept="image/*"
             style="padding:10px 14px; background:#f8fafc;">
      <p class="hint">📷 JPEG・PNG・GIF・WebP に対応しています</p>
    </div>

    <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">
      🚀 予約する
    </button>
  </form>
</div>

<script>
  // min を今より1分後に設定
  const dt = document.getElementById('scheduled_at');
  if (!dt.value) {
    const now = new Date(Date.now() + 60000);
    now.setSeconds(0, 0);
    // datetime-local の value は YYYY-MM-DDTHH:MM 形式
    const pad = n => String(n).padStart(2, '0');
    dt.value =
      `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}` +
      `T${pad(now.getHours())}:${pad(now.getMinutes())}`;
  }

  // 文字数カウンター
  function updateCount(el) {
    const n = el.value.length;
    const span = document.getElementById('char-count');
    span.textContent = n;
    span.className = n > 300 ? 'char-over' : n > 260 ? 'char-warn' : 'char-ok';
  }
  // ページ読み込み時にも更新
  updateCount(document.getElementById('text'));
</script>

{% endblock %}
