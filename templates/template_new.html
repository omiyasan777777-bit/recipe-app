{% extends "base.html" %}
{% block content %}

<div style="margin-bottom:20px;">
  <a href="{{ url_for('templates_list') }}" style="font-size:15px; color:#0085ff; text-decoration:none;">← テンプレート一覧</a>
</div>

<div class="card">
  <h2 style="font-size:18px; font-weight:700; margin-bottom:20px;">📋 テンプレート新規作成</h2>

  <form method="post">

    <div class="form-group">
      <label for="name">テンプレート名</label>
      <input type="text" id="name" name="name"
             placeholder="例: 今日のレシピ"
             value="{{ form.get('name', '') }}" maxlength="100">
    </div>

    <div class="form-group">
      <label for="body">テンプレート本文</label>
      <textarea id="body" name="body"
                placeholder="変数は {変数名} の形式で埋め込めます。&#10;例: 今日のレシピは「{料理名}」です！&#10;材料: {材料}&#10;作り方: {作り方}"
                oninput="updatePreview()">{{ form.get('body', '') }}</textarea>
      <p class="hint">💡 <code>{変数名}</code> と書いた部分が「使う」ときに入力欄になります</p>
    </div>

    <div class="form-group">
      <label for="hashtags">ハッシュタグ（任意）</label>
      <input type="text" id="hashtags" name="hashtags"
             placeholder="例: #料理 #レシピ #今日のごはん"
             value="{{ form.get('hashtags', '') }}"
             oninput="updatePreview()">
      <p class="hint">📌 投稿の末尾に自動で追加されます</p>
    </div>

    <div class="form-group" id="preview-section" style="display:none;">
      <label>プレビュー（変数は <code>{変数名}</code> のまま表示）</label>
      <div id="preview-box" style="background:var(--gray-100); border-radius:var(--radius); padding:12px 14px; font-size:15px; line-height:1.6; white-space:pre-wrap; word-break:break-word; min-height:60px;"></div>
      <div class="char-count">
        <span id="preview-count" class="char-ok">0</span> / 300 文字（参考）
      </div>
    </div>

    <button type="submit" class="btn btn-primary btn-full">💾 保存する</button>
  </form>
</div>

<script>
  function updatePreview() {
    const body = document.getElementById('body').value;
    const hashtags = document.getElementById('hashtags').value.trim();
    let text = body;
    if (hashtags) text = text.trimEnd() + '\n' + hashtags;

    const section = document.getElementById('preview-section');
    const box = document.getElementById('preview-box');
    const count = document.getElementById('preview-count');

    if (text.trim()) {
      section.style.display = '';
      box.textContent = text;
      const n = text.length;
      count.textContent = n;
      count.className = n > 300 ? 'char-over' : n > 260 ? 'char-warn' : 'char-ok';
    } else {
      section.style.display = 'none';
    }
  }
  // 初期化
  updatePreview();
</script>

{% endblock %}
