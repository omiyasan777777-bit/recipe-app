{% extends "base.html" %}
{% block content %}

<div style="margin-bottom:20px;">
  <h2 style="font-size:18px; font-weight:700; margin-bottom:4px;">🖼️ サムネイル画像プロンプト生成</h2>
  <p style="font-size:14px; color:var(--gray-400);">入力内容をもとに AI 画像生成用のプロンプトを作成します</p>
</div>

<div class="card">
  <div class="form-group">
    <label for="title">タイトル・テーマ <span style="color:var(--red)">*</span></label>
    <input type="text" id="title" placeholder="例: 簡単10分チキンカレーの作り方" maxlength="100"
           oninput="generate()">
  </div>

  <div class="form-group">
    <label for="platform">プラットフォーム</label>
    <select id="platform" onchange="generate()">
      <option value="youtube">YouTube サムネイル</option>
      <option value="blog">ブログ・記事アイキャッチ</option>
      <option value="sns">SNS（正方形）</option>
      <option value="general">汎用</option>
    </select>
  </div>

  <div class="form-group">
    <label>スタイル</label>
    <div id="style-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
      <label class="style-chip" data-value="photorealistic">
        <input type="radio" name="style" value="photorealistic" checked onchange="generate()">
        <span>📷 フォトリアル</span>
      </label>
      <label class="style-chip" data-value="illustration">
        <input type="radio" name="style" value="illustration" onchange="generate()">
        <span>🎨 イラスト</span>
      </label>
      <label class="style-chip" data-value="flat">
        <input type="radio" name="style" value="flat" onchange="generate()">
        <span>🟦 フラットデザイン</span>
      </label>
      <label class="style-chip" data-value="cinematic">
        <input type="radio" name="style" value="cinematic" onchange="generate()">
        <span>🎬 シネマティック</span>
      </label>
    </div>
  </div>

  <div class="form-group">
    <label>雰囲気・ムード</label>
    <div id="mood-grid" style="display:flex; flex-wrap:wrap; gap:8px;">
      <label class="mood-tag"><input type="checkbox" value="bright, cheerful" onchange="generate()"> <span>明るい・元気</span></label>
      <label class="mood-tag"><input type="checkbox" value="calm, minimalist" onchange="generate()"> <span>落ち着いた</span></label>
      <label class="mood-tag"><input type="checkbox" value="luxurious, premium" onchange="generate()"> <span>高級感</span></label>
      <label class="mood-tag"><input type="checkbox" value="cozy, warm" onchange="generate()"> <span>温かみ</span></label>
      <label class="mood-tag"><input type="checkbox" value="energetic, dynamic" onchange="generate()"> <span>エネルギッシュ</span></label>
      <label class="mood-tag"><input type="checkbox" value="dark, moody" onchange="generate()"> <span>ダーク</span></label>
    </div>
  </div>

  <div class="form-group">
    <label for="colors">カラースキーム（任意）</label>
    <input type="text" id="colors" placeholder="例: 赤と白、パステルカラー、モノクロ"
           oninput="generate()">
  </div>

  <div class="form-group">
    <label for="keywords">追加キーワード（任意）</label>
    <input type="text" id="keywords" placeholder="例: 俯瞰、食材、木のテーブル、スタジオ照明"
           oninput="generate()">
  </div>

  <div class="form-group">
    <label for="lang">出力言語</label>
    <select id="lang" onchange="generate()">
      <option value="en">English（英語）</option>
      <option value="ja">日本語</option>
    </select>
  </div>
</div>

<!-- 生成結果 -->
<div id="result-section" style="display:none;">
  <div class="card" style="border: 2px solid var(--blue);">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <span style="font-size:14px; font-weight:700; color:var(--blue);">生成されたプロンプト</span>
      <button onclick="copyPrompt()" class="btn btn-outline" style="padding:6px 14px; font-size:13px;" id="copy-btn">
        📋 コピー
      </button>
    </div>
    <div id="prompt-box"
         style="background:var(--gray-100); border-radius:10px; padding:14px; font-size:14px;
                line-height:1.7; white-space:pre-wrap; word-break:break-word; user-select:all;
                font-family: 'Courier New', monospace; color: var(--gray-800);">
    </div>

    <div style="margin-top:14px; display:flex; gap:8px; flex-wrap:wrap;">
      <a id="midjourney-link" href="#" target="_blank" class="btn btn-outline" style="padding:8px 14px; font-size:13px;" onclick="openMidjourney(event)">
        🎨 Midjourney で開く
      </a>
      <button onclick="copyForDalle()" class="btn btn-outline" style="padding:8px 14px; font-size:13px;">
        🤖 DALL-E 用にコピー
      </button>
    </div>
  </div>

  <!-- バリエーション -->
  <div class="card">
    <div style="font-size:14px; font-weight:700; margin-bottom:12px; color:var(--gray-600);">バリエーション</div>
    <div id="variations-box" style="display:flex; flex-direction:column; gap:10px;"></div>
  </div>
</div>

<div id="empty-state" style="text-align:center; padding:40px 16px; color:var(--gray-400);">
  <div style="font-size:48px; margin-bottom:12px;">🖼️</div>
  <div style="font-size:15px;">タイトル・テーマを入力するとプロンプトが生成されます</div>
</div>

<style>
  .style-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: border-color .15s, background .15s;
    background: #fff;
  }
  .style-chip:has(input:checked) {
    border-color: var(--blue);
    background: #eff6ff;
    color: var(--blue);
  }
  .style-chip input { display: none; }

  .mood-tag {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border: 1.5px solid var(--gray-200);
    border-radius: 999px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: border-color .15s, background .15s;
    background: #fff;
  }
  .mood-tag:has(input:checked) {
    border-color: var(--blue);
    background: #eff6ff;
    color: var(--blue);
  }
  .mood-tag input { display: none; }

  .variation-item {
    background: var(--gray-100);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
    font-family: 'Courier New', monospace;
    line-height: 1.6;
    cursor: pointer;
    transition: background .15s;
    position: relative;
  }
  .variation-item:hover { background: var(--gray-200); }
  .variation-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--gray-400);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 6px;
    font-family: inherit;
  }
</style>

<script>
  const STYLE_MAP = {
    photorealistic: { en: "photorealistic, high quality photography, DSLR, sharp focus, professional lighting", ja: "フォトリアル、高品質写真、シャープなフォーカス、プロ照明" },
    illustration:   { en: "digital illustration, vibrant colors, detailed artwork, concept art style", ja: "デジタルイラスト、鮮やかな色彩、詳細なアートワーク" },
    flat:           { en: "flat design, vector art, clean lines, bold colors, minimal shadows", ja: "フラットデザイン、ベクターアート、クリーンなライン、ボールドカラー" },
    cinematic:      { en: "cinematic, dramatic lighting, depth of field, film grain, movie poster style", ja: "シネマティック、ドラマチックな照明、被写界深度、映画ポスタースタイル" },
  };

  const PLATFORM_MAP = {
    youtube: { en: "YouTube thumbnail, 16:9 aspect ratio, eye-catching, bold composition", ja: "YouTubeサムネイル、16:9アスペクト比、目を引くデザイン" },
    blog:    { en: "blog header image, 16:9 wide format, editorial style, clean layout", ja: "ブログアイキャッチ、16:9、エディトリアルスタイル" },
    sns:     { en: "social media post, square 1:1 format, visually striking", ja: "SNS投稿画像、正方形1:1、視覚的にインパクトのある" },
    general: { en: "digital artwork, versatile composition, high resolution", ja: "デジタルアートワーク、汎用構図、高解像度" },
  };

  const QUALITY_SUFFIX = {
    en: "8K resolution, masterpiece, best quality, highly detailed",
    ja: "8K解像度、マスターピース、最高品質、高精細",
  };

  let lastPrompt = "";

  function getSelectedStyle() {
    const el = document.querySelector('input[name="style"]:checked');
    return el ? el.value : "photorealistic";
  }

  function getSelectedMoods() {
    return Array.from(document.querySelectorAll('.mood-tag input:checked'))
                .map(el => el.value);
  }

  function generate() {
    const title = document.getElementById('title').value.trim();
    const platform = document.getElementById('platform').value;
    const style = getSelectedStyle();
    const moods = getSelectedMoods();
    const colors = document.getElementById('colors').value.trim();
    const keywords = document.getElementById('keywords').value.trim();
    const lang = document.getElementById('lang').value;

    const resultSection = document.getElementById('result-section');
    const emptyState = document.getElementById('empty-state');

    if (!title) {
      resultSection.style.display = 'none';
      emptyState.style.display = '';
      return;
    }

    emptyState.style.display = 'none';
    resultSection.style.display = '';

    const prompt = buildPrompt(title, platform, style, moods, colors, keywords, lang);
    lastPrompt = prompt;
    document.getElementById('prompt-box').textContent = prompt;

    buildVariations(title, platform, style, lang);
  }

  function buildPrompt(title, platform, style, moods, colors, keywords, lang) {
    const parts = [];

    if (lang === 'en') {
      // Subject from title
      parts.push(`Thumbnail image for: "${title}"`);
      // Platform
      parts.push(PLATFORM_MAP[platform].en);
      // Style
      parts.push(STYLE_MAP[style].en);
      // Moods
      if (moods.length) parts.push(moods.join(', '));
      // Colors
      if (colors) parts.push(`color scheme: ${colors}`);
      // Keywords
      if (keywords) parts.push(keywords);
      // Quality
      parts.push(QUALITY_SUFFIX.en);
    } else {
      parts.push(`「${title}」のサムネイル画像`);
      parts.push(PLATFORM_MAP[platform].ja);
      parts.push(STYLE_MAP[style].ja);
      if (moods.length) {
        const moodJa = moods.map(m => m.split(',')[0].trim());
        parts.push(moodJa.join('、'));
      }
      if (colors) parts.push(`カラースキーム: ${colors}`);
      if (keywords) parts.push(keywords);
      parts.push(QUALITY_SUFFIX.ja);
    }

    return parts.join(', ');
  }

  function buildVariations(title, platform, style, lang) {
    const styles = ['photorealistic', 'illustration', 'flat', 'cinematic']
      .filter(s => s !== style)
      .slice(0, 3);

    const labelMap = {
      photorealistic: "フォトリアル風",
      illustration:   "イラスト風",
      flat:           "フラットデザイン風",
      cinematic:      "シネマティック風",
    };

    const variationsBox = document.getElementById('variations-box');
    variationsBox.innerHTML = '';

    styles.forEach(s => {
      const vPrompt = buildPrompt(title, platform, s, [], '', '', lang);
      const div = document.createElement('div');
      div.className = 'variation-item';
      div.innerHTML = `<div class="variation-label">${labelMap[s]}</div><div>${vPrompt}</div>`;
      div.onclick = () => {
        lastPrompt = vPrompt;
        document.getElementById('prompt-box').textContent = vPrompt;
        showCopied(false);
      };
      variationsBox.appendChild(div);
    });
  }

  function copyPrompt() {
    if (!lastPrompt) return;
    navigator.clipboard.writeText(lastPrompt).then(() => showCopied(true));
  }

  function copyForDalle() {
    if (!lastPrompt) return;
    // DALL-E prefers concise prompts; strip "Thumbnail image for: " prefix
    let p = lastPrompt.replace(/^Thumbnail image for: ".*?",\s*/, '');
    p = p.replace(/^「.*?」のサムネイル画像,\s*/, '');
    navigator.clipboard.writeText(p).then(() => {
      const btn = event.target;
      btn.textContent = '✅ コピー済み';
      setTimeout(() => { btn.textContent = '🤖 DALL-E 用にコピー'; }, 2000);
    });
  }

  function openMidjourney(e) {
    e.preventDefault();
    if (!lastPrompt) return;
    const encoded = encodeURIComponent('/imagine prompt: ' + lastPrompt + ' --ar 16:9 --v 6');
    window.open('https://discord.com/channels/@me', '_blank');
    navigator.clipboard.writeText('/imagine prompt: ' + lastPrompt + ' --ar 16:9 --v 6');
    alert('プロンプトをクリップボードにコピーしました。\nDiscord の Midjourney ボットチャンネルに貼り付けてください。');
  }

  function showCopied(setCopyBtn) {
    if (setCopyBtn) {
      const btn = document.getElementById('copy-btn');
      btn.textContent = '✅ コピー済み';
      setTimeout(() => { btn.textContent = '📋 コピー'; }, 2000);
    }
  }
</script>

{% endblock %}
