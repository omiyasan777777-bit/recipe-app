<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>🦋 Bluesky 予約投稿</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:    #0085ff;
      --blue-dk: #006dcc;
      --green:   #22c55e;
      --red:     #ef4444;
      --yellow:  #f59e0b;
      --gray-50: #f8fafc;
      --gray-100:#f1f5f9;
      --gray-200:#e2e8f0;
      --gray-400:#94a3b8;
      --gray-600:#475569;
      --gray-800:#1e293b;
      --radius:  12px;
      --shadow:  0 2px 12px rgba(0,0,0,.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--gray-50);
      color: var(--gray-800);
      min-height: 100vh;
    }

    /* ヘッダー */
    header {
      background: #fff;
      border-bottom: 1px solid var(--gray-200);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 16px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--blue);
      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
    }
    .header-actions { display: flex; gap: 8px; }
    .icon-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      border: none;
      background: var(--gray-100);
      color: var(--gray-600);
      font-size: 20px;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
      cursor: pointer;
      transition: background .15s;
    }
    .icon-btn:hover { background: var(--gray-200); }

    /* メインコンテンツ */
    main {
      max-width: 600px;
      margin: 0 auto;
      padding: 16px;
    }

    /* フラッシュメッセージ */
    .flash { border-radius: var(--radius); padding: 14px 16px; margin-bottom: 16px; font-size: 15px; line-height: 1.5; }
    .flash-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
    .flash-warning { background: #fef9c3; color: #92400e; border: 1px solid #fde68a; }
    .flash-danger  { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

    /* カード */
    .card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 12px;
    }

    /* ボタン */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 12px 20px;
      border-radius: var(--radius);
      border: none;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--blue); color: #fff; }
    .btn-primary:hover { background: var(--blue-dk); }
    .btn-danger  { background: var(--red);  color: #fff; }
    .btn-outline {
      background: transparent;
      color: var(--gray-600);
      border: 1.5px solid var(--gray-200);
    }
    .btn-full { width: 100%; }

    /* フォーム */
    label { display: block; font-size: 14px; font-weight: 600; color: var(--gray-600); margin-bottom: 6px; }
    input[type="text"], input[type="password"], input[type="datetime-local"],
    textarea, select {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      font-size: 16px;
      font-family: inherit;
      color: var(--gray-800);
      background: #fff;
      appearance: none;
      -webkit-appearance: none;
      transition: border-color .15s;
      outline: none;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--blue); }
    textarea { resize: vertical; min-height: 120px; line-height: 1.6; }
    .form-group { margin-bottom: 20px; }
    .hint { font-size: 13px; color: var(--gray-400); margin-top: 6px; }
    .char-count { font-size: 13px; margin-top: 6px; text-align: right; }
    .char-ok  { color: var(--gray-400); }
    .char-warn{ color: var(--yellow); }
    .char-over{ color: var(--red); }

    /* ステータスバッジ */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    .badge-pending { background: #fef9c3; color: #92400e; }
    .badge-posted  { background: #dcfce7; color: #166534; }
    .badge-failed  { background: #fee2e2; color: #991b1b; }

    /* フィルタータブ */
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
    .tab {
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
      border: 1.5px solid var(--gray-200);
      color: var(--gray-600);
      background: #fff;
    }
    .tab.active { background: var(--blue); color: #fff; border-color: var(--blue); }

    /* 投稿カード内レイアウト */
    .post-text { font-size: 16px; line-height: 1.6; margin-bottom: 10px; word-break: break-word; }
    .post-meta { font-size: 13px; color: var(--gray-400); display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .post-actions { margin-top: 12px; display: flex; justify-content: flex-end; }

    /* FAB (投稿ボタン) */
    .fab {
      position: fixed;
      bottom: 24px; right: 24px;
      width: 60px; height: 60px;
      border-radius: 50%;
      background: var(--blue);
      color: #fff;
      font-size: 28px;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(0,133,255,.4);
      transition: transform .15s, box-shadow .15s;
      z-index: 50;
    }
    .fab:active { transform: scale(.93); box-shadow: 0 2px 8px rgba(0,133,255,.3); }

    .empty {
      text-align: center;
      padding: 48px 16px;
      color: var(--gray-400);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-text { font-size: 16px; }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <a href="{{ url_for('index') }}" class="header-title">🦋 予約投稿</a>
    <div class="header-actions">
      <a href="{{ url_for('templates_list') }}" class="icon-btn" title="テンプレート">📋</a>
      <a href="{{ url_for('settings') }}" class="icon-btn" title="設定">⚙️</a>
    </div>
  </div>
</header>

<main>
  {% for category, message in get_flashed_messages(with_categories=true) %}
  <div class="flash flash-{{ category }}">{{ message }}</div>
  {% endfor %}

  {% block content %}{% endblock %}
</main>
</body>
</html>
