<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理画面</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f5f5f7; --bg3: #ebebef;
      --accent: #6c5ce7; --accent2: #8b7cf8;
      --text: #111111; --muted: #555577; --border: #dddde8;
      --radius: 10px; --danger: #ef4444;
    }
    body { background: var(--bg2); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif; min-height: 100vh; }

    nav {
      background: rgba(255,255,255,.95); border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    .nav-logo { font-weight: 800; color: var(--accent); font-size: 16px; }
    .nav-link { color: var(--muted); text-decoration: none; font-size: 14px; }
    .nav-link:hover { color: var(--text); }

    .container { max-width: 720px; margin: 0 auto; padding: 32px 24px 80px; }

    h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 6px; }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 36px; }

    .section { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 24px; }
    .section-title { font-size: 13px; font-weight: 700; letter-spacing: .1em; color: var(--accent); text-transform: uppercase; margin-bottom: 20px; }

    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; margin-top: 14px; }
    label:first-of-type { margin-top: 0; }
    input, textarea, select {
      width: 100%; background: var(--bg2); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; padding: 10px 14px;
      font-size: 14px; font-family: inherit; outline: none;
      transition: border-color .2s;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 80px; }

    /* 画像アップロード */
    .avatar-wrap { display: flex; align-items: center; gap: 20px; margin-top: 4px; }
    .avatar-preview {
      width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--border);
      background: var(--bg2); display: flex; align-items: center; justify-content: center;
      font-size: 32px; overflow: hidden; flex-shrink: 0;
    }
    .avatar-preview img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .avatar-btns { display: flex; flex-direction: column; gap: 8px; }
    .btn-upload {
      padding: 8px 16px; background: var(--accent); color: #fff;
      border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background .2s; white-space: nowrap;
    }
    .btn-upload:hover { background: var(--accent2); }
    .btn-remove-avatar {
      padding: 7px 16px; background: none; border: 1px solid var(--border);
      color: var(--muted); border-radius: 8px; font-size: 13px; cursor: pointer;
      transition: all .2s; white-space: nowrap;
    }
    .btn-remove-avatar:hover { border-color: var(--danger); color: var(--danger); }
    #avatar-input { display: none; }

    .card-group { border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-top: 12px; position: relative; background: var(--bg2); }
    .card-group + .card-group { margin-top: 10px; }
    .card-num { font-size: 11px; color: var(--muted); margin-bottom: 12px; font-weight: 700; letter-spacing: .05em; }
    .btn-remove {
      position: absolute; top: 12px; right: 12px;
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer;
      transition: all .2s;
    }
    .btn-remove:hover { border-color: var(--danger); color: var(--danger); }

    .btn-add {
      width: 100%; margin-top: 10px; padding: 10px;
      background: none; border: 1px dashed var(--border);
      color: var(--muted); border-radius: 8px; font-size: 13px;
      cursor: pointer; transition: all .2s;
    }
    .btn-add:hover { border-color: var(--accent); color: var(--accent); }

    .actions { display: flex; gap: 12px; margin-top: 32px; flex-wrap: wrap; }
    .btn-save {
      flex: 1; padding: 14px; background: var(--accent); color: #fff;
      border: none; border-radius: 999px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background .2s;
    }
    .btn-save:hover { background: var(--accent2); }
    .btn-preview {
      padding: 14px 24px; background: none;
      border: 1px solid var(--border); color: var(--text);
      border-radius: 999px; font-size: 15px; font-weight: 600;
      cursor: pointer; text-decoration: none; display: flex; align-items: center;
      transition: all .2s;
    }
    .btn-preview:hover { border-color: var(--accent); color: var(--accent); }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--accent); color: #fff;
      padding: 12px 28px; border-radius: 999px; font-size: 14px; font-weight: 600;
      opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 100;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: var(--danger); }

    .gh-info {
      font-size: 12px; color: var(--muted); margin-top: 8px; line-height: 1.6;
    }
    .gh-status {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; margin-top: 8px; padding: 4px 10px;
      border-radius: 999px; font-weight: 600;
    }
    .gh-status.ok { background: #d1fae5; color: #065f46; }
    .gh-status.err { background: #fee2e2; color: #991b1b; }
    .gh-status.pending { background: #fef3c7; color: #92400e; }
    .gh-toggle {
      font-size: 12px; color: var(--accent); cursor: pointer;
      text-decoration: underline; background: none; border: none; padding: 0;
      margin-top: 6px; display: inline-block;
    }
    .gh-section { display: none; margin-top: 12px; }
    .gh-section.open { display: block; }

    /* 画像アップロード（1.91:1） */
    .img-preview-191 {
      width: 100%; aspect-ratio: 191 / 100;
      border: 2px dashed var(--border); border-radius: 8px;
      background: var(--bg2); display: flex; align-items: center; justify-content: center;
      overflow: hidden; margin-top: 4px; cursor: pointer;
    }
    .img-preview-191 img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .img-preview-191 .img-placeholder { color: var(--muted); font-size: 13px; text-align: center; }
    .img-btns { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
    .btn-upload-sm {
      padding: 6px 12px; background: var(--accent); color: #fff;
      border: none; border-radius: 8px; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: background .2s; white-space: nowrap;
    }
    .btn-upload-sm:hover { background: var(--accent2); }
    .btn-remove-sm {
      padding: 5px 12px; background: none; border: 1px solid var(--border);
      color: var(--muted); border-radius: 8px; font-size: 12px; cursor: pointer;
      transition: all .2s; white-space: nowrap;
    }
    .btn-remove-sm:hover { border-color: var(--danger); color: var(--danger); }
  </style>
</head>
<body>

<nav>
  <span class="nav-logo">管理画面</span>
  <a href="index.html" class="nav-link">← サイトを見る</a>
</nav>

<div class="container">
  <h1>コンテンツ編集</h1>
  <p class="subtitle">変更後「保存する」を押すとサイトに反映されます。</p>

  <!-- プロフィール -->
  <div class="section">
    <div class="section-title">プロフィール</div>
    <label>名前 / ニックネーム</label>
    <input type="text" id="name" placeholder="例: omiyasan">
    <label>ヒーロー見出し（大きなタイトル）</label>
    <input type="text" id="hero_title" placeholder="例: ブログ＆ツールまとめ">
    <label>ヒーロー画像（見出しの上・1.91:1）</label>
    <div class="img-preview-191" id="hero-img-preview" onclick="document.getElementById('hero-img-input').click()">
      <span class="img-placeholder">📷 クリックして画像を選択</span>
    </div>
    <div class="img-btns">
      <button type="button" class="btn-upload-sm" onclick="document.getElementById('hero-img-input').click()">画像を選択</button>
      <button type="button" class="btn-remove-sm" onclick="removeHeroImage()">削除</button>
    </div>
    <input type="file" id="hero-img-input" accept="image/*" onchange="onHeroImageChange(event)" style="display:none">
    <label>一言説明</label>
    <textarea id="hero_desc" placeholder="例: 技術記事・自作ツール・ポートフォリオをまとめたサイトです。"></textarea>
    <label>自己紹介</label>
    <textarea id="bio" placeholder="例: 趣味でツールを作ったり記事を書いています。"></textarea>
    <label>プロフィール画像</label>
    <div class="avatar-wrap">
      <div class="avatar-preview" id="avatar-preview">👤</div>
      <div class="avatar-btns">
        <button class="btn-upload" onclick="document.getElementById('avatar-input').click()">画像を選択</button>
        <button class="btn-remove-avatar" onclick="removeAvatar()">画像を削除</button>
      </div>
    </div>
    <input type="file" id="avatar-input" accept="image/*" onchange="onAvatarChange(event)">
  </div>

  <!-- SNSリンク -->
  <div class="section">
    <div class="section-title">SNS リンク</div>
    <label>Threads URL</label>
    <input type="url" id="threads" placeholder="https://www.threads.net/@...">
    <label>X URL</label>
    <input type="url" id="x" placeholder="https://x.com/...">
    <label>note URL</label>
    <input type="url" id="note_url" placeholder="https://note.com/...">
  </div>

  <!-- ブログ記事 -->
  <div class="section">
    <div class="section-title">ブログ記事</div>
    <div id="blog-list"></div>
    <button class="btn-add" onclick="addBlog()">＋ 記事を追加</button>
  </div>

  <!-- ツール -->
  <div class="section">
    <div class="section-title">ツール・作ったもの</div>
    <div id="tool-list"></div>
    <button class="btn-add" onclick="addTool()">＋ ツールを追加</button>
  </div>

  <!-- メニュー -->
  <div class="section">
    <div class="section-title">メニュー</div>
    <div id="menu-list"></div>
    <button class="btn-add" onclick="addMenu()">＋ メニューを追加</button>
  </div>

  <!-- GitHub設定 -->
  <div class="section">
    <div class="section-title">GitHub 連携設定</div>
    <p class="gh-info">この設定をすると「保存する」ボタンを押したとき、スマホや他の端末でも同じ内容が表示されます。</p>
    <div id="gh-status-wrap"></div>
    <button class="gh-toggle" onclick="toggleGhSection()">▶ トークンを設定する</button>
    <div class="gh-section" id="gh-section">
      <label style="margin-top:12px">GitHub Personal Access Token</label>
      <input type="password" id="gh-token" placeholder="github_pat_xxxxx または ghp_xxxxx">
      <p class="gh-info">
        取得方法: <a href="https://github.com/settings/tokens/new?scopes=public_repo&description=recipe-app-admin" target="_blank" style="color:var(--accent)">こちらでトークンを作成</a>（public_repo スコープにチェック）<br>
        ※ トークンはこのブラウザのみに保存され、外部には送信されません（GitHub APIにのみ使用）。
      </p>
      <button class="btn-upload" style="margin-top:8px" onclick="saveToken()">トークンを保存</button>
    </div>
  </div>

  <div class="actions">
    <button class="btn-save" onclick="save()">保存する</button>
    <a href="index.html" class="btn-preview">プレビュー →</a>
  </div>
</div>

<div class="toast" id="toast">保存しました！</div>

<script>
  let avatarData = '';
  let heroImageData = '';
  let blogImgCounter = 0;

  function onAvatarChange(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      avatarData = ev.target.result;
      updateAvatarPreview(avatarData);
    };
    reader.readAsDataURL(file);
  }

  function onHeroImageChange(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      heroImageData = ev.target.result;
      updateHeroImagePreview(heroImageData);
    };
    reader.readAsDataURL(file);
  }

  function removeHeroImage() {
    heroImageData = '';
    updateHeroImagePreview('');
    document.getElementById('hero-img-input').value = '';
  }

  function updateHeroImagePreview(src) {
    const preview = document.getElementById('hero-img-preview');
    if (src) {
      preview.innerHTML = `<img src="${src}" alt="ヒーロー画像">`;
    } else {
      preview.innerHTML = '<span class="img-placeholder">📷 クリックして画像を選択</span>';
    }
  }

  function onBlogImageChange(e, fileInput) {
    const file = e.target.files[0];
    if (!file) return;
    const card = fileInput.closest('.card-group');
    const reader = new FileReader();
    reader.onload = ev => {
      const src = ev.target.result;
      card.querySelector('.blog-image').value = src;
      card.querySelector('.blog-img-preview').innerHTML = `<img src="${src}" alt="">`;
    };
    reader.readAsDataURL(file);
  }

  function removeBlogImage(btn) {
    const card = btn.closest('.card-group');
    card.querySelector('.blog-image').value = '';
    card.querySelector('.blog-img-preview').innerHTML = '<span class="img-placeholder">📷 クリックして画像を選択</span>';
    const fileInput = card.querySelector('input[type="file"].blog-img-file');
    if (fileInput) fileInput.value = '';
  }

  function removeAvatar() {
    avatarData = '';
    updateAvatarPreview('');
    document.getElementById('avatar-input').value = '';
  }

  function updateAvatarPreview(src) {
    const preview = document.getElementById('avatar-preview');
    if (src) {
      preview.innerHTML = `<img src="${src}" alt="プロフィール画像">`;
    } else {
      preview.innerHTML = '👤';
    }
  }

  function addBlog(data = {}) {
    const list = document.getElementById('blog-list');
    const idx = list.children.length;
    const imgId = 'blog-img-' + (blogImgCounter++);
    const div = document.createElement('div');
    div.className = 'card-group';
    div.innerHTML = `
      <div class="card-num">記事 ${idx + 1}</div>
      <button class="btn-remove" onclick="this.parentElement.remove()">削除</button>
      <label>タグ（例：技術、日記）</label>
      <input type="text" class="blog-tag" value="${data.tag||''}" placeholder="技術">
      <label>タイトル</label>
      <input type="text" class="blog-title" value="${data.title||''}" placeholder="記事のタイトル">
      <label>概要（2〜3行）</label>
      <textarea class="blog-desc" placeholder="記事の概要">${data.desc||''}</textarea>
      <label>URL</label>
      <input type="url" class="blog-url" value="${data.url||''}" placeholder="https://...">
      <label>日付（例：2026年3月）</label>
      <input type="text" class="blog-date" value="${data.date||''}" placeholder="2026年3月">
      <label>サムネイル画像（1.91:1）</label>
      <div class="img-preview-191 blog-img-preview" onclick="document.getElementById('${imgId}').click()">
        ${data.image ? `<img src="${data.image}" alt="">` : '<span class="img-placeholder">📷 クリックして画像を選択</span>'}
      </div>
      <input type="hidden" class="blog-image" value="${data.image||''}">
      <div class="img-btns">
        <button type="button" class="btn-upload-sm" onclick="document.getElementById('${imgId}').click()">画像を選択</button>
        <button type="button" class="btn-remove-sm" onclick="removeBlogImage(this)">削除</button>
      </div>
      <input type="file" id="${imgId}" class="blog-img-file" accept="image/*" style="display:none" onchange="onBlogImageChange(event, this)">
    `;
    list.appendChild(div);
  }

  function addMenu(data = {}) {
    const list = document.getElementById('menu-list');
    const idx = list.children.length;
    const imgId = 'menu-img-' + (blogImgCounter++);
    const div = document.createElement('div');
    div.className = 'card-group';
    div.innerHTML = `
      <div class="card-num">メニュー ${idx + 1}</div>
      <button class="btn-remove" onclick="this.parentElement.remove()">削除</button>
      <label>カテゴリ（例：主食、汁物）</label>
      <input type="text" class="menu-category" value="${data.category||''}" placeholder="主食">
      <label>アイコン（絵文字）</label>
      <input type="text" class="menu-icon" value="${data.icon||'🍽️'}" placeholder="🍽️" style="max-width:80px">
      <label>料理名</label>
      <input type="text" class="menu-title" value="${data.title||''}" placeholder="料理名">
      <label>説明（2〜3行）</label>
      <textarea class="menu-desc" placeholder="料理の説明">${data.desc||''}</textarea>
      <label>URL（レシピページなど）</label>
      <input type="url" class="menu-url" value="${data.url||''}" placeholder="https://...">
      <label>画像（1.91:1）</label>
      <div class="img-preview-191 menu-img-preview" onclick="document.getElementById('${imgId}').click()">
        ${data.image ? `<img src="${data.image}" alt="">` : '<span class="img-placeholder">📷 クリックして画像を選択</span>'}
      </div>
      <input type="hidden" class="menu-image" value="${data.image||''}">
      <div class="img-btns">
        <button type="button" class="btn-upload-sm" onclick="document.getElementById('${imgId}').click()">画像を選択</button>
        <button type="button" class="btn-remove-sm" onclick="removeMenuImage(this)">削除</button>
      </div>
      <input type="file" id="${imgId}" class="menu-img-file" accept="image/*" style="display:none" onchange="onMenuImageChange(event, this)">
    `;
    list.appendChild(div);
  }

  function onMenuImageChange(e, fileInput) {
    const file = e.target.files[0];
    if (!file) return;
    const card = fileInput.closest('.card-group');
    const reader = new FileReader();
    reader.onload = ev => {
      const src = ev.target.result;
      card.querySelector('.menu-image').value = src;
      card.querySelector('.menu-img-preview').innerHTML = `<img src="${src}" alt="">`;
    };
    reader.readAsDataURL(file);
  }

  function removeMenuImage(btn) {
    const card = btn.closest('.card-group');
    card.querySelector('.menu-image').value = '';
    card.querySelector('.menu-img-preview').innerHTML = '<span class="img-placeholder">📷 クリックして画像を選択</span>';
    const fileInput = card.querySelector('input[type="file"].menu-img-file');
    if (fileInput) fileInput.value = '';
  }

  function addTool(data = {}) {
    const list = document.getElementById('tool-list');
    const idx = list.children.length;
    const div = document.createElement('div');
    div.className = 'card-group';
    div.innerHTML = `
      <div class="card-num">ツール ${idx + 1}</div>
      <button class="btn-remove" onclick="this.parentElement.remove()">削除</button>
      <label>アイコン（絵文字）</label>
      <input type="text" class="tool-icon" value="${data.icon||'🛠️'}" placeholder="🛠️" style="max-width:80px">
      <label>ツール名</label>
      <input type="text" class="tool-title" value="${data.title||''}" placeholder="ツール名">
      <label>説明</label>
      <textarea class="tool-desc" placeholder="ツールの説明">${data.desc||''}</textarea>
      <label>URL</label>
      <input type="url" class="tool-url" value="${data.url||''}" placeholder="https://...">
    `;
    list.appendChild(div);
  }

  const GH_OWNER  = 'omiyasan777777-bit';
  const GH_REPO   = 'recipe-app';
  const GH_PATH   = 'siteData.json';
  const GH_BRANCH = 'master';

  function toggleGhSection() {
    const sec = document.getElementById('gh-section');
    sec.classList.toggle('open');
    const btn = document.querySelector('.gh-toggle');
    btn.textContent = sec.classList.contains('open') ? '▼ トークンを設定する' : '▶ トークンを設定する';
  }

  function saveToken() {
    const token = document.getElementById('gh-token').value.trim();
    if (!token) return;
    localStorage.setItem('ghToken', token);
    document.getElementById('gh-section').classList.remove('open');
    document.querySelector('.gh-toggle').textContent = '▶ トークンを設定する';
    showGhStatus('ok', 'トークン設定済み（保存時にGitHubへ自動アップロード）');
  }

  function showGhStatus(type, msg) {
    const wrap = document.getElementById('gh-status-wrap');
    wrap.innerHTML = `<span class="gh-status ${type}">${msg}</span>`;
  }

  async function saveToGitHub(data) {
    const token = localStorage.getItem('ghToken');
    if (!token) return false;

    showGhStatus('pending', '⏳ GitHubへ保存中...');

    try {
      const headers = {
        'Authorization': 'Bearer ' + token,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json',
      };

      // 現在のファイルSHAを取得（キャッシュ無効化）
      let sha = '';
      const getRes = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}?ref=${GH_BRANCH}&t=${Date.now()}`, { headers, cache: 'no-store' });
      if (getRes.ok) {
        const fileData = await getRes.json();
        sha = fileData.sha;
      }

      // ファイルを更新（base64エンコード）
      const json = JSON.stringify(data, null, 2);
      const content = btoa(unescape(encodeURIComponent(json)));
      const body = { message: 'Update site data', content, branch: GH_BRANCH };
      if (sha) body.sha = sha;

      const putRes = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}`, {
        method: 'PUT', headers, body: JSON.stringify(body),
      });

      if (putRes.ok) {
        showGhStatus('ok', '✓ GitHubへ保存完了（全端末に反映されます）');
        return true;
      } else {
        const err = await putRes.json();
        showGhStatus('err', '✗ GitHub保存エラー: ' + (err.message || putRes.status));
        return false;
      }
    } catch (e) {
      showGhStatus('err', '✗ 通信エラー: ' + e.message);
      return false;
    }
  }

  async function save() {
    const blogs = [...document.querySelectorAll('#blog-list .card-group')].map(el => ({
      tag:   el.querySelector('.blog-tag').value,
      title: el.querySelector('.blog-title').value,
      desc:  el.querySelector('.blog-desc').value,
      url:   el.querySelector('.blog-url').value,
      date:  el.querySelector('.blog-date').value,
      image: el.querySelector('.blog-image').value,
    }));
    const tools = [...document.querySelectorAll('#tool-list .card-group')].map(el => ({
      icon:  el.querySelector('.tool-icon').value,
      title: el.querySelector('.tool-title').value,
      desc:  el.querySelector('.tool-desc').value,
      url:   el.querySelector('.tool-url').value,
    }));
    const menus = [...document.querySelectorAll('#menu-list .card-group')].map(el => ({
      category: el.querySelector('.menu-category').value,
      icon:     el.querySelector('.menu-icon').value,
      title:    el.querySelector('.menu-title').value,
      desc:     el.querySelector('.menu-desc').value,
      url:      el.querySelector('.menu-url').value,
      image:    el.querySelector('.menu-image').value,
    }));
    const data = {
      name:       document.getElementById('name').value,
      hero_title: document.getElementById('hero_title').value,
      hero_desc:  document.getElementById('hero_desc').value,
      bio:        document.getElementById('bio').value,
      threads:    document.getElementById('threads').value,
      x:          document.getElementById('x').value,
      note_url:   document.getElementById('note_url').value,
      avatar:     avatarData,
      hero_image: heroImageData,
      blogs, tools, menus,
    };
    localStorage.setItem('siteData', JSON.stringify(data));

    const ghOk = await saveToGitHub(data);

    const t = document.getElementById('toast');
    t.classList.remove('error');
    if (ghOk) {
      t.textContent = '保存しました！（全端末に反映）';
    } else if (localStorage.getItem('ghToken')) {
      t.textContent = '保存しました（GitHub連携エラー）';
      t.classList.add('error');
    } else {
      t.textContent = 'このブラウザに保存しました';
    }
    t.classList.add('show');
    setTimeout(() => { t.classList.remove('show', 'error'); t.textContent = '保存しました！'; }, 3000);
  }

  function applyFormData(d) {
    document.getElementById('name').value = d.name || '';
    document.getElementById('hero_title').value = d.hero_title || '';
    document.getElementById('hero_desc').value = d.hero_desc || '';
    document.getElementById('bio').value = d.bio || '';
    document.getElementById('threads').value = d.threads || '';
    document.getElementById('x').value = d.x || '';
    document.getElementById('note_url').value = d.note_url || '';

    avatarData = d.avatar || '';
    updateAvatarPreview(avatarData);

    heroImageData = d.hero_image || '';
    updateHeroImagePreview(heroImageData);

    const blogs = d.blogs || [{title:'',desc:'',url:'',tag:'',date:''}];
    document.getElementById('blog-list').innerHTML = '';
    blogs.forEach(b => addBlog(b));

    const tools = d.tools || [{icon:'🛠️',title:'',desc:'',url:''}];
    document.getElementById('tool-list').innerHTML = '';
    tools.forEach(t => addTool(t));

    const menus = d.menus || [{category:'',icon:'🍽️',title:'',desc:'',url:'',image:''}];
    document.getElementById('menu-list').innerHTML = '';
    menus.forEach(m => addMenu(m));
  }

  async function load() {
    const token = localStorage.getItem('ghToken');
    if (token) {
      showGhStatus('ok', 'トークン設定済み（GitHubからデータ読み込み中…）');
      try {
        const headers = { Authorization: `token ${token}`, Accept: 'application/vnd.github+json' };
        const res = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}?ref=${GH_BRANCH}`, { headers });
        if (res.ok) {
          const json = await res.json();
          const d = JSON.parse(atob(json.content.replace(/\n/g, '')));
          localStorage.setItem('siteData', JSON.stringify(d));
          applyFormData(d);
          showGhStatus('ok', 'トークン設定済み（GitHubから読み込み完了）');
          return;
        }
      } catch (e) {}
      showGhStatus('ok', 'トークン設定済み（GitHub読み込み失敗、ローカルを使用）');
    }
    applyFormData(JSON.parse(localStorage.getItem('siteData') || '{}'));
  }

  load();
</script>
</body>
</html>
