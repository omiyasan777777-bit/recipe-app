<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Collaborator</title>
  <style>
    /* ── Reset & Base ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-canvas:       #e8e5e0;
      --bg-card:         #ffffff;
      --bg-card-header:  #f5f3f0;
      --border-card:     #d0ccc7;
      --border-focus:    #d97757;
      --text-primary:    #2d2d2d;
      --text-secondary:  #666;
      --text-muted:      #aaa;
      --accent:          #d97757;
      --accent-hover:    #c4623e;
      --dot-color:       #ccc9c3;
      --shadow-card:     0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.08);
      --radius-card:     12px;
      --titlebar-height: 38px;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg-canvas);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      user-select: none;
    }

    /* ── Toolbar ───────────────────────────────────────────────── */
    #toolbar {
      position: fixed;
      top: var(--titlebar-height);
      left: 0; right: 0;
      height: 48px;
      background: rgba(240, 237, 232, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-card);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 10px;
      z-index: 1000;
      -webkit-app-region: drag;
    }

    #toolbar > * { -webkit-app-region: no-drag; }

    .toolbar-brand {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      margin-right: 6px;
    }

    .toolbar-brand span { color: var(--accent); }

    .toolbar-divider {
      width: 1px; height: 20px;
      background: var(--border-card);
    }

    .toolbar-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border-card);
      background: var(--bg-card);
      color: var(--text-primary);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
    }

    .toolbar-btn:hover {
      background: var(--bg-card-header);
      border-color: var(--accent);
      color: var(--accent);
    }

    .toolbar-btn:active { transform: scale(0.96); }
    .toolbar-btn svg { flex-shrink: 0; }

    .toolbar-btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .toolbar-btn-primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
      color: #fff;
    }

    .toolbar-hint {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ── Viewport ──────────────────────────────────────────────── */
    #viewport {
      position: fixed;
      top: calc(var(--titlebar-height) + 48px);
      left: 0; right: 0; bottom: 0;
      overflow: hidden;
      cursor: default;
    }

    /* Dot-grid background */
    #viewport::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, var(--dot-color) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: 0;
    }

    /* The infinite world */
    #canvas-world {
      position: absolute;
      top: 0; left: 0;
      width: 0; height: 0;
      transform-origin: 0 0;
      will-change: transform;
    }

    /* ── Claude Card ───────────────────────────────────────────── */
    .claude-card {
      position: absolute;
      width: 800px;
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      overflow: hidden;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .claude-card.focused {
      border-color: var(--border-focus);
      box-shadow: var(--shadow-card), 0 0 0 2px rgba(217, 119, 87, 0.25);
    }

    /* Card header — drag handle */
    .card-header {
      display: flex;
      align-items: center;
      padding: 0 12px;
      height: 36px;
      background: var(--bg-card-header);
      border-bottom: 1px solid var(--border-card);
      cursor: grab;
      flex-shrink: 0;
      gap: 8px;
    }

    .card-header:active { cursor: grabbing; }

    /* macOS-style traffic lights */
    .card-traffic-lights {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-shrink: 0;
    }

    .traffic-light {
      width: 12px; height: 12px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      transition: filter 0.1s;
      flex-shrink: 0;
    }

    .traffic-light:hover { filter: brightness(0.85); }
    .tl-close { background: #ff5f57; }
    .tl-min   { background: #febc2e; }
    .tl-max   { background: #28c840; }

    .card-title {
      flex: 1;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
    }

    .card-title-icon {
      display: inline-block;
      width: 14px;
      height: 14px;
      background: var(--accent);
      border-radius: 3px;
      margin-right: 5px;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    /* Spacer to balance title centering */
    .card-header-right { width: 42px; flex-shrink: 0; }

    /* Card body: fills card below the 36px header */
    .card-body {
      position: absolute;
      top: 36px; left: 0; right: 0; bottom: 0;
      background: #fff;
      overflow: hidden;
    }

    /* Loading overlay */
    .card-loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #fff;
      z-index: 2;
      transition: opacity 0.3s;
    }

    .card-loading.hidden { opacity: 0; pointer-events: none; }

    .loading-spinner {
      width: 24px; height: 24px;
      border: 2px solid var(--border-card);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Webview fills card-body */
    .claude-webview {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border: none;
    }

    /* Resize handles */
    .card-resize-handle {
      position: absolute;
      z-index: 10;
    }

    .card-resize-handle[data-dir="se"] { bottom: 0; right: 0; width: 14px; height: 14px; cursor: se-resize; }
    .card-resize-handle[data-dir="sw"] { bottom: 0; left: 0;  width: 14px; height: 14px; cursor: sw-resize; }
    .card-resize-handle[data-dir="ne"] { top: 0;    right: 0; width: 14px; height: 14px; cursor: ne-resize; }
    .card-resize-handle[data-dir="nw"] { top: 0;    left: 0;  width: 14px; height: 14px; cursor: nw-resize; }
    .card-resize-handle[data-dir="n"]  { top: 0;    left: 14px; right: 14px; height: 6px; cursor: n-resize; }
    .card-resize-handle[data-dir="s"]  { bottom: 0; left: 14px; right: 14px; height: 6px; cursor: s-resize; }
    .card-resize-handle[data-dir="e"]  { right: 0;  top: 14px; bottom: 14px; width: 6px;  cursor: e-resize; }
    .card-resize-handle[data-dir="w"]  { left: 0;   top: 14px; bottom: 14px; width: 6px;  cursor: w-resize; }

    .card-resize-handle[data-dir="se"]::after {
      content: '';
      position: absolute;
      bottom: 3px; right: 3px;
      width: 6px; height: 6px;
      border-right: 2px solid var(--text-muted);
      border-bottom: 2px solid var(--text-muted);
      border-radius: 1px;
    }

    /* ── Empty State ───────────────────────────────────────────── */
    #empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      pointer-events: none;
      z-index: 1;
      transition: opacity 0.3s;
    }

    #empty-state.hidden { opacity: 0; }

    .empty-icon {
      width: 64px; height: 64px;
      opacity: 0.18;
    }

    .empty-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .empty-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      opacity: 0.7;
    }

    /* ── Zoom indicator ────────────────────────────────────────── */
    #zoom-indicator {
      position: fixed;
      bottom: 16px; right: 16px;
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      color: var(--text-secondary);
      pointer-events: none;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.3s;
    }

    #zoom-indicator.visible { opacity: 1; }
  </style>
</head>
<body>

  <!-- Toolbar -->
  <div id="toolbar">
    <div class="toolbar-brand">Collab<span>·</span>Claude</div>
    <div class="toolbar-divider"></div>

    <button class="toolbar-btn toolbar-btn-primary" id="btn-new-claude">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      New Claude Code
    </button>

    <button class="toolbar-btn" id="btn-reset-view">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <rect x="1" y="1" width="10" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/>
        <path d="M4 6h4M6 4v4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      Reset View
    </button>

    <div class="toolbar-hint">
      Right-click drag or middle-click to pan &nbsp;·&nbsp; Ctrl+Scroll to zoom
    </div>
  </div>

  <!-- Infinite canvas -->
  <div id="viewport">
    <div id="canvas-world">
      <!-- Claude Code cards injected here by renderer.js -->
    </div>

    <div id="empty-state">
      <!-- Claude logo SVG -->
      <svg class="empty-icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="14" fill="#d97757"/>
        <text x="32" y="44" text-anchor="middle" font-size="32" fill="white" font-family="serif">C</text>
      </svg>
      <div class="empty-title">No Claude Code sessions yet</div>
      <div class="empty-subtitle">Click "New Claude Code" to open a session on the canvas</div>
    </div>
  </div>

  <!-- Zoom level indicator -->
  <div id="zoom-indicator">100%</div>

  <script src="./renderer.js"></script>
</body>
</html>
